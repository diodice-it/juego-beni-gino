<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Carrera Beni vs Gino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            width: 100%; height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #mobile-controls {
            display: none;
            width: 100%;
        }
        #mobile-controls button {
            flex: 1;
            border: none;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        #btn-jump {
            background: #1B5E20;
            color: rgba(255,255,255,0.85);
            border-right: 1px solid rgba(0,0,0,0.3);
        }
        #btn-jump:active { background: #388E3C; }
        #btn-duck {
            background: #BF360C;
            color: rgba(255,255,255,0.85);
        }
        #btn-duck:active { background: #E65100; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="mobile-controls">
        <button id="btn-jump">SALTAR</button>
        <button id="btn-duck">AGACHARSE</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const GAME_W = 800;
        const GAME_H = 700;
        canvas.width = GAME_W;
        canvas.height = GAME_H;

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 900);

        const mobileControls = document.getElementById('mobile-controls');

        function resizeCanvas() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (isMobile) {
                const btnH = Math.max(44, Math.floor(h * 0.08));
                const canvasH = h - btnH;
                const scale = Math.min(w / GAME_W, canvasH / GAME_H);
                const cw = Math.floor(GAME_W * scale);
                const ch = Math.floor(GAME_H * scale);
                canvas.style.width = cw + 'px';
                canvas.style.height = ch + 'px';
                canvas.style.borderRadius = '0';
                mobileControls.style.display = 'flex';
                mobileControls.style.height = (h - ch) + 'px';
            } else {
                const scale = Math.min(w / GAME_W, h / GAME_H, 1);
                canvas.style.width = Math.floor(GAME_W * scale) + 'px';
                canvas.style.height = Math.floor(GAME_H * scale) + 'px';
                mobileControls.style.display = 'none';
            }
        }
        window.addEventListener('resize', resizeCanvas);
        screen.orientation && screen.orientation.addEventListener('change', resizeCanvas);
        resizeCanvas();

        // --- ESCENARIOS ---
        const SCENE_CHANGE_DIST = 1000;
        const scenes = [
            { name: 'Bosque', sky1: '#87CEEB', sky2: '#E1F5FE', ground: '#8BC34A', groundLine: '#689F38', grass: '#7CB342', mountain: '#66BB6A', hills: '#81C784', treeTrunk: '#6D4C41', treeLeaf1: '#388E3C', treeLeaf2: '#2E7D32', isCity: false },
            { name: 'Desierto', sky1: '#FF8F00', sky2: '#FFF8E1', ground: '#F4D03F', groundLine: '#D4AC0D', grass: '#E8C52A', mountain: '#E0A830', hills: '#ECBF3C', treeTrunk: '#A1887F', treeLeaf1: '#8BC34A', treeLeaf2: '#689F38', isCity: false },
            { name: 'Nieve', sky1: '#B3E5FC', sky2: '#E3F2FD', ground: '#ECEFF1', groundLine: '#CFD8DC', grass: '#B0BEC5', mountain: '#fff', hills: '#E0E0E0', treeTrunk: '#5D4037', treeLeaf1: '#2196F3', treeLeaf2: '#1565C0', isCity: false },
            { name: 'Ciudad', sky1: '#455A64', sky2: '#90A4AE', ground: '#616161', groundLine: '#424242', grass: '#757575', mountain: '#78909C', hills: '#607D8B', treeTrunk: '#9E9E9E', treeLeaf1: '#78909C', treeLeaf2: '#607D8B', isCity: true },
            { name: 'Espacio', sky1: '#0D0221', sky2: '#1A0533', ground: '#4A148C', groundLine: '#6A1B9A', grass: '#7B1FA2', mountain: '#311B92', hills: '#4527A0', treeTrunk: '#CE93D8', treeLeaf1: '#E040FB', treeLeaf2: '#AA00FF', isCity: false, isSpace: true },
        ];
        const BASE_SPEED = 6;
        const SPEED_INCREMENT = 0.3;

        // --- SKINS ---
        const skins = [
            { id: 'boca', label: 'Boca', shirtColor: '#003DA5', shortsColor: '#003DA5', shoeColor: '#FFD200', acc: 'vincha', accColor: '#FFD200', stripe: '#FFD200' },
            { id: 'huracan', label: 'Huracán', shirtColor: '#FFFFFF', shortsColor: '#CE1126', shoeColor: '#fff', acc: 'vincha', accColor: '#CE1126', stripe: '#CE1126' },
            { id: 'superhero', label: 'Superhéroe', shirtColor: '#D32F2F', shortsColor: '#1565C0', shoeColor: '#FFD54F', acc: 'capa', accColor: '#D32F2F' },
            { id: 'ninja', label: 'Ninja', shirtColor: '#212121', shortsColor: '#212121', shoeColor: '#333', acc: 'mascara', accColor: '#212121' },
            { id: 'astro', label: 'Astronauta', shirtColor: '#ECEFF1', shortsColor: '#B0BEC5', shoeColor: '#78909C', acc: 'casco', accColor: '#E0E0E0' },
            { id: 'zombie', label: 'Zombie', shirtColor: '#558B2F', shortsColor: '#33691E', shoeColor: '#4E342E', acc: 'herida', accColor: '#C62828', skinTint: '#A5D6A7' },
            { id: 'rey', label: 'Rey', shirtColor: '#7B1FA2', shortsColor: '#4A148C', shoeColor: '#FFD54F', acc: 'corona', accColor: '#FFD54F' },
            { id: 'rockero', label: 'Rockero', shirtColor: '#212121', shortsColor: '#424242', shoeColor: '#E53935', acc: 'lentes', accColor: '#212121' },
        ];

        // --- JUGADORES ---
        const players = [
            { name: 'GINO', color: '#003DA5', skinColor: '#FFCC80', hairColor: '#F9D853', hairStyle: 'corto', height: 80, width: 46, best: null, skin: skins[0] },
            { name: 'BENI', color: '#CE1126', skinColor: '#FFCC80', hairColor: '#5D4037', hairStyle: 'rulos', height: 65, width: 40, best: null, skin: skins[1] }
        ];

        const GRAVITY = 0.8;
        const JUMP_FORCE = -14;
        const DUCK_HEIGHT_RATIO = 0.5;

        let currentPlayer = 0;
        let state = 'menu';
        let skinSelectPlayer = 0;
        let skinHover = -1;
        let game = {};
        let frameCount = 0;
        let particles = [];
        let keysDown = {};
        let touchDucking = false;
        let deadTimer = 0;

        // --- SCENE TRANSITION ---
        let sceneTransition = { active: false, progress: 0, fromColors: null, toColors: null };

        // --- SPEED LINES ---
        let speedLines = [];

        // --- HUD EFFECTS ---
        let meterPop = 0; // pop animation timer
        let lastThousand = 0; // last thousand milestone
        let sceneNameFade = 0; // fade timer for scene name
        let sceneNameText = '';
        let meterFlash = 0; // golden flash

        // --- RESULTS ANIMATION ---
        let resultsTimer = 0;
        let confettiParticles = [];

        // --- MENU PARTICLES ---
        let menuParticles = [];

        // --- PARTÍCULAS ---
        function addParticle(x, y, vx, vy, life, size, color) {
            if (particles.length > 100) return;
            particles.push({ x, y, vx, vy, life, maxLife: life, size, color: color || null });
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                if (p.color && p.color.startsWith('rgba')) {
                    ctx.fillStyle = p.color;
                } else if (p.color) {
                    ctx.fillStyle = p.color.replace(')', `,${alpha * 0.7})`).replace('rgb', 'rgba');
                } else {
                    ctx.fillStyle = `rgba(200,180,150,${alpha * 0.6})`;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // --- CONFETTI PARTICLES (results) ---
        function initConfetti() {
            confettiParticles = [];
            const colors = ['#FFD54F', '#FF5252', '#69F0AE', '#448AFF', '#FF4081', '#E040FB', '#00E5FF'];
            for (let i = 0; i < 80; i++) {
                confettiParticles.push({
                    x: Math.random() * GAME_W,
                    y: Math.random() * -GAME_H,
                    vx: (Math.random() - 0.5) * 3,
                    vy: 1.5 + Math.random() * 3,
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    size: 4 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    shape: Math.random() > 0.5 ? 'rect' : 'circle'
                });
            }
        }

        function updateConfetti() {
            confettiParticles.forEach(c => {
                c.x += c.vx;
                c.y += c.vy;
                c.rot += c.rotSpeed;
                c.vx += (Math.random() - 0.5) * 0.1;
                if (c.y > GAME_H + 20) { c.y = -20; c.x = Math.random() * GAME_W; }
                if (c.x < -20) c.x = GAME_W + 20;
                if (c.x > GAME_W + 20) c.x = -20;
            });
        }

        function drawConfetti() {
            confettiParticles.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rot);
                ctx.fillStyle = c.color;
                if (c.shape === 'rect') {
                    ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, c.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });
        }

        // --- MENU PARTICLES (falling stars) ---
        function updateMenuParticles() {
            if (menuParticles.length < 30 && Math.random() < 0.1) {
                menuParticles.push({
                    x: Math.random() * GAME_W,
                    y: -10,
                    vy: 0.5 + Math.random() * 1.5,
                    vx: (Math.random() - 0.5) * 0.5,
                    size: 1 + Math.random() * 2,
                    life: 200 + Math.random() * 200,
                    maxLife: 400
                });
            }
            for (let i = menuParticles.length - 1; i >= 0; i--) {
                const p = menuParticles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0 || p.y > GAME_H) menuParticles.splice(i, 1);
            }
        }

        function drawMenuParticles() {
            menuParticles.forEach(p => {
                const alpha = Math.min(p.life / 60, 1) * 0.6;
                ctx.fillStyle = `rgba(255,215,79,${alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // --- SPEED LINES ---
        function updateSpeedLines(speed) {
            const threshold = BASE_SPEED + 2;
            if (speed > threshold) {
                const intensity = Math.min((speed - threshold) / 8, 1);
                const count = Math.floor(intensity * 3);
                for (let i = 0; i < count; i++) {
                    if (speedLines.length < 15) {
                        speedLines.push({
                            x: GAME_W + 10,
                            y: 50 + Math.random() * (game.groundY - 100),
                            len: 40 + Math.random() * 80 * intensity,
                            speed: speed * (0.8 + Math.random() * 0.4),
                            alpha: 0.15 + intensity * 0.25,
                            width: 1 + Math.random() * 2
                        });
                    }
                }
            }
            for (let i = speedLines.length - 1; i >= 0; i--) {
                speedLines[i].x -= speedLines[i].speed * 2;
                if (speedLines[i].x + speedLines[i].len < 0) speedLines.splice(i, 1);
            }
        }

        function drawSpeedLines() {
            speedLines.forEach(l => {
                ctx.strokeStyle = `rgba(255,255,255,${l.alpha})`;
                ctx.lineWidth = l.width;
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + l.len, l.y);
                ctx.stroke();
            });
        }

        // --- SCENE TRANSITION LERP ---
        function lerpColor(a, b, t) {
            // Parse hex to RGB
            const pa = parseInt(a.slice(1), 16);
            const pb = parseInt(b.slice(1), 16);
            const r = Math.round(((pa >> 16) & 255) * (1 - t) + ((pb >> 16) & 255) * t);
            const g = Math.round(((pa >> 8) & 255) * (1 - t) + ((pb >> 8) & 255) * t);
            const bl = Math.round((pa & 255) * (1 - t) + (pb & 255) * t);
            return `rgb(${r},${g},${bl})`;
        }

        function getTransitionedScene() {
            const cur = scenes[game.currentScene % scenes.length];
            if (!sceneTransition.active) return cur;
            const t = sceneTransition.progress;
            const from = sceneTransition.fromColors;
            const to = cur;
            const result = {};
            const colorKeys = ['sky1', 'sky2', 'ground', 'groundLine', 'grass', 'mountain', 'hills', 'treeTrunk', 'treeLeaf1', 'treeLeaf2'];
            colorKeys.forEach(k => {
                if (from[k] && to[k]) {
                    result[k] = lerpColor(from[k], to[k], t);
                } else {
                    result[k] = to[k];
                }
            });
            result.name = to.name;
            result.isCity = to.isCity;
            result.isSpace = to.isSpace;
            return result;
        }

        // --- JUEGO ---
        function initRun() {
            const p = players[currentPlayer];
            const groundY = 600;
            game = {
                runner: {
                    x: 80, y: groundY - p.height,
                    w: p.width, h: p.height,
                    normalH: p.height,
                    vy: 0, grounded: true,
                    ducking: false,
                    distance: 0,
                    speed: BASE_SPEED,
                    maxSpeed: BASE_SPEED,
                    runFrame: 0, alive: true
                },
                obstacles: [],
                groundY, bgOffset: 0,
                nextObstacle: 70,
                clouds: [], trees: [], hills: [],
                currentScene: 0,
                lastSceneChange: 0,
                scenesVisited: 1,
                powerups: [],
                heldPowerup: null,
                shieldActive: false,
                slowmoTimer: 0,
                lastTapTime: 0,
                nextPowerup: 200
            };
            particles = [];
            speedLines = [];
            meterPop = 0;
            lastThousand = 0;
            sceneNameFade = 0;
            sceneNameText = scenes[0].name;
            meterFlash = 0;
            sceneTransition = { active: false, progress: 0, fromColors: null };
            generateScenery();
            frameCount = 0;
        }

        function generateScenery() {
            game.clouds = [];
            game.trees = [];
            game.hills = [];
            for (let i = 0; i < 8; i++) {
                game.clouds.push({ x: Math.random() * 900, y: 30 + Math.random() * 80, w: 60 + Math.random() * 80, speed: 0.3 + Math.random() * 0.5 });
            }
            for (let i = 0; i < 12; i++) {
                game.trees.push({ x: Math.random() * 900, h: 40 + Math.random() * 50 });
            }
            for (let i = 0; i < 6; i++) {
                game.hills.push({ x: Math.random() * 1000, w: 150 + Math.random() * 150, h: 40 + Math.random() * 40 });
            }
        }

        function currentScene() {
            return scenes[game.currentScene % scenes.length];
        }

        function spawnObstacle(xOffset) {
            const scene = currentScene();
            const sceneName = scene.name;
            let rand = Math.random();
            let type, w, h, elevated = false;

            // No voladores antes de 500m
            const dist = game.runner ? game.runner.distance : 0;
            const allowFlying = dist >= 500;

            if (sceneName === 'Bosque') {
                if (!allowFlying && rand >= 0.8) rand = Math.random() * 0.8;
                if (rand < 0.35) { type = 'rock'; w = 40; h = 35; }
                else if (rand < 0.65) { type = 'tronco'; w = 55; h = 40; }
                else if (rand < 0.8) { type = 'hongo'; w = 30; h = 48; }
                else { type = 'bird'; w = 50; h = 30; elevated = true; }
            } else if (sceneName === 'Desierto') {
                if (!allowFlying && rand >= 0.85) rand = Math.random() * 0.85;
                if (rand < 0.4) { type = 'cactus'; w = 28; h = 60; }
                else if (rand < 0.7) { type = 'rock'; w = 40; h = 35; }
                else if (rand < 0.85) { type = 'serpiente'; w = 45; h = 20; }
                else { type = 'buitre'; w = 55; h = 30; elevated = true; }
            } else if (sceneName === 'Nieve') {
                if (!allowFlying && rand >= 0.8) rand = Math.random() * 0.8;
                if (rand < 0.35) { type = 'hielo'; w = 45; h = 38; }
                else if (rand < 0.6) { type = 'snowman'; w = 38; h = 60; }
                else if (rand < 0.8) { type = 'rock'; w = 40; h = 35; }
                else { type = 'bird'; w = 50; h = 30; elevated = true; }
            } else if (sceneName === 'Ciudad') {
                if (!allowFlying && rand >= 0.8) rand = Math.random() * 0.8;
                if (rand < 0.35) { type = 'auto'; w = 65; h = 40; }
                else if (rand < 0.6) { type = 'cono'; w = 24; h = 40; }
                else if (rand < 0.8) { type = 'box'; w = 45; h = 45; }
                else { type = 'cartel'; w = 55; h = 28; elevated = true; }
            } else {
                if (!allowFlying && rand >= 0.8) rand = Math.random() * 0.8;
                if (rand < 0.35) { type = 'meteorito'; w = 42; h = 40; }
                else if (rand < 0.6) { type = 'alien'; w = 38; h = 55; }
                else if (rand < 0.8) { type = 'cristal'; w = 28; h = 60; }
                else { type = 'satelite'; w = 55; h = 28; elevated = true; }
            }

            const p = players[currentPlayer];
            let y;
            if (elevated) {
                h = game.groundY - Math.floor(p.height * DUCK_HEIGHT_RATIO) - 20;
                y = 0;
            } else {
                y = game.groundY - h;
            }

            const spawnX = 850 + (xOffset || 0);
            game.obstacles.push({ x: spawnX, y, w, h, type, elevated, wingFrame: 0 });
        }

        function spawnCombo() {
            spawnObstacle(0);
            spawnObstacle(100);
        }

        function spawnPowerup() {
            const types = ['shield', 'magnet', 'slowmo'];
            const type = types[Math.floor(Math.random() * types.length)];
            const w = 30, h = 30;
            const y = game.groundY - 80 - Math.random() * 40;
            game.powerups.push({ x: 850, y, w, h, type, frame: 0 });
        }

        function activatePowerup() {
            if (!game.heldPowerup) return;
            const type = game.heldPowerup;
            game.heldPowerup = null;
            const r = game.runner;

            if (type === 'shield') {
                game.shieldActive = true;
                for (let i = 0; i < 15; i++) {
                    addParticle(r.x + r.w/2, r.y + r.h/2, (Math.random()-0.5)*6, (Math.random()-0.5)*6, 30, 3, 'rgb(255,215,0)');
                }
            } else if (type === 'magnet') {
                r.distance += 200;
                meterPop = 40;
                meterFlash = 50;
                for (let i = 0; i < 15; i++) {
                    addParticle(r.x + r.w/2, r.y + r.h/2, (Math.random()-0.5)*6, (Math.random()-0.5)*6, 30, 3, 'rgb(76,175,80)');
                }
            } else if (type === 'slowmo') {
                game.slowmoTimer = 180;
                for (let i = 0; i < 15; i++) {
                    addParticle(r.x + r.w/2, r.y + r.h/2, (Math.random()-0.5)*6, (Math.random()-0.5)*6, 30, 3, 'rgb(33,150,243)');
                }
            }
        }

        function drawPowerupItem(pu) {
            const cx = pu.x + pu.w/2;
            const cy = pu.y + pu.h/2 + Math.sin(pu.frame * 0.08) * 5;
            ctx.save();

            // Glow
            const glowColors = { shield: 'rgba(255,215,0,0.3)', magnet: 'rgba(76,175,80,0.3)', slowmo: 'rgba(33,150,243,0.3)' };
            ctx.shadowColor = glowColors[pu.type];
            ctx.shadowBlur = 12;

            if (pu.type === 'shield') {
                // Círculo dorado
                ctx.fillStyle = '#FFD54F';
                ctx.beginPath();
                ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFA000';
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(cx - 3, cy - 3, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (pu.type === 'magnet') {
                // Estrella verde 5 puntas
                ctx.fillStyle = '#66BB6A';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = -Math.PI/2 + (i * 2 * Math.PI / 5);
                    const innerAngle = angle + Math.PI / 5;
                    ctx.lineTo(cx + Math.cos(angle) * 12, cy + Math.sin(angle) * 12);
                    ctx.lineTo(cx + Math.cos(innerAngle) * 5, cy + Math.sin(innerAngle) * 5);
                }
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#43A047';
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (pu.type === 'slowmo') {
                // Reloj azul
                ctx.fillStyle = '#42A5F5';
                ctx.beginPath();
                ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1565C0';
                ctx.beginPath();
                ctx.arc(cx, cy, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.fill();
                // Agujas
                ctx.strokeStyle = '#1565C0';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx, cy - 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + 3, cy + 1);
                ctx.stroke();
            }

            // Partículas sutiles
            if (pu.frame % 8 === 0) {
                const colors = { shield: 'rgb(255,215,0)', magnet: 'rgb(76,175,80)', slowmo: 'rgb(33,150,243)' };
                addParticle(cx + (Math.random()-0.5)*10, cy + (Math.random()-0.5)*10, (Math.random()-0.5)*1, -Math.random()*1, 15, 2, colors[pu.type]);
            }

            ctx.restore();
        }

        function update() {
            if (state === 'dead') {
                deadTimer++;
                updateParticles();
                if (deadTimer > 120) {
                    recordResult();
                }
                return;
            }
            if (state !== 'playing') return;

            const r = game.runner;
            const p = players[currentPlayer];
            frameCount++;
            r.runFrame++;

            // Duck
            if (keysDown['ArrowDown'] || keysDown['KeyS']) {
                if (!r.ducking && r.grounded) {
                    r.ducking = true;
                    r.h = Math.floor(r.normalH * DUCK_HEIGHT_RATIO);
                    r.y = game.groundY - r.h;
                }
            } else if (!touchDucking) {
                if (r.ducking) {
                    r.ducking = false;
                    r.h = r.normalH;
                    r.y = game.groundY - r.h;
                }
            }

            // Speed - sube cada 600m
            r.speed = BASE_SPEED + Math.floor(r.distance / 600) * SPEED_INCREMENT;
            // Slowmo effect
            if (game.slowmoTimer > 0) {
                r.speed *= 0.6;
                game.slowmoTimer--;
            }
            if (r.speed > r.maxSpeed) r.maxSpeed = r.speed;
            r.distance += r.speed * 0.5;

            // Meter pop effect
            const currentThousand = Math.floor(r.distance / 1000);
            if (currentThousand > lastThousand) {
                lastThousand = currentThousand;
                meterPop = 30;
            }
            if (meterPop > 0) meterPop--;
            if (meterFlash > 0) meterFlash--;

            // Scene change with transition
            const newScene = Math.floor(r.distance / SCENE_CHANGE_DIST) % scenes.length;
            if (newScene !== game.currentScene) {
                // Start transition
                const oldScene = scenes[game.currentScene % scenes.length];
                sceneTransition = {
                    active: true,
                    progress: 0,
                    fromColors: { ...oldScene }
                };
                game.currentScene = newScene;
                game.scenesVisited++;
                sceneNameFade = 120;
                sceneNameText = scenes[newScene].name;
                meterFlash = 40;
                generateScenery();
                // Scene change star particles
                for (let i = 0; i < 15; i++) {
                    addParticle(Math.random() * GAME_W, Math.random() * game.groundY,
                        (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4,
                        40, 2 + Math.random() * 3, 'rgb(255,215,79)');
                }
            }

            // Update scene transition
            if (sceneTransition.active) {
                sceneTransition.progress += 1 / 60;
                if (sceneTransition.progress >= 1) {
                    sceneTransition.active = false;
                    sceneTransition.progress = 1;
                }
            }

            if (sceneNameFade > 0) sceneNameFade--;

            // Gravity
            if (!r.grounded) {
                r.vy += GRAVITY;
                r.y += r.vy;
                if (r.y >= game.groundY - r.h) {
                    r.y = game.groundY - r.h;
                    r.vy = 0;
                    r.grounded = true;
                    for (let i = 0; i < 5; i++) addParticle(r.x + r.w / 2, game.groundY, -Math.random() * 2 - 1, -Math.random() * 2, 20, Math.random() * 4 + 2);
                }
            }

            // Dust
            if (r.grounded && frameCount % 6 === 0) addParticle(r.x, game.groundY, -Math.random() * 2 - 1, -Math.random() * 2, 20, Math.random() * 4 + 2);

            // Background scroll
            game.bgOffset = (game.bgOffset + r.speed) % 900;
            game.clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) c.x = 850; });
            game.trees.forEach(t => { t.x -= r.speed * 0.3; if (t.x < -40) t.x = 850 + Math.random() * 100; });
            game.hills.forEach(h => { h.x -= r.speed * 0.2; if (h.x + h.w < -50) h.x = 900 + Math.random() * 200; });

            // Speed lines
            updateSpeedLines(r.speed);

            // Obstacles - dificultad progresiva
            game.nextObstacle--;
            let obstacleRate;
            if (r.distance < 500) obstacleRate = 120;
            else if (r.distance < 1500) obstacleRate = 90;
            else if (r.distance < 3000) obstacleRate = 60;
            else obstacleRate = 40;
            if (game.nextObstacle <= 0) {
                // Combos desde 1500m
                let isCombo = false;
                if (r.distance >= 3000 && Math.random() < 0.35) isCombo = true;
                else if (r.distance >= 1500 && Math.random() < 0.20) isCombo = true;

                if (isCombo) {
                    spawnCombo();
                } else {
                    spawnObstacle();
                }
                game.nextObstacle = obstacleRate + Math.floor(Math.random() * 35);
            }

            // Power-ups spawn
            game.nextPowerup--;
            if (game.nextPowerup <= 0 && r.distance >= 300) {
                spawnPowerup();
                game.nextPowerup = Math.floor(400 + Math.random() * 300) / (r.speed * 0.5);
            }

            // Update power-ups on screen
            for (let i = game.powerups.length - 1; i >= 0; i--) {
                const pu = game.powerups[i];
                pu.x -= r.speed;
                pu.frame++;
                if (pu.x + pu.w < 0) { game.powerups.splice(i, 1); continue; }

                // Collision with runner (recoger)
                if (r.x + r.w > pu.x && r.x < pu.x + pu.w &&
                    r.y + r.h > pu.y && r.y < pu.y + pu.h) {
                    game.heldPowerup = pu.type;
                    game.powerups.splice(i, 1);
                    // Pickup particles
                    const colors = { shield: 'rgb(255,215,0)', magnet: 'rgb(76,175,80)', slowmo: 'rgb(33,150,243)' };
                    for (let j = 0; j < 10; j++) {
                        addParticle(pu.x + pu.w/2, pu.y + pu.h/2, (Math.random()-0.5)*6, (Math.random()-0.5)*6, 25, 3, colors[pu.type]);
                    }
                }
            }

            for (let i = game.obstacles.length - 1; i >= 0; i--) {
                const o = game.obstacles[i];
                o.x -= r.speed;
                if (o.wingFrame !== undefined) o.wingFrame++;
                if (o.x + o.w < 0) { game.obstacles.splice(i, 1); continue; }

                // Collision
                const margin = 6;
                if (r.x + r.w - margin > o.x && r.x + margin < o.x + o.w &&
                    r.y + r.h > o.y + margin && r.y < o.y + o.h - margin) {
                    // Escudo activo - absorbe el golpe
                    if (game.shieldActive) {
                        game.shieldActive = false;
                        game.obstacles.splice(i, 1);
                        for (let j = 0; j < 20; j++) {
                            addParticle(r.x + r.w/2, r.y + r.h/2, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 30, 3 + Math.random()*3, 'rgb(255,215,0)');
                        }
                        continue;
                    }
                    r.alive = false;
                    state = 'dead';
                    deadTimer = 0;
                    // Death particles with skin colors
                    const skin = p.skin || skins[0];
                    const deathColors = ['rgb(255,80,80)', `rgb(${hexToRgb(skin.shirtColor)})`, `rgb(${hexToRgb(skin.shortsColor)})`];
                    for (let j = 0; j < 25; j++) {
                        const col = deathColors[j % deathColors.length];
                        addParticle(r.x + r.w / 2, r.y + r.h / 2, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 35, Math.random() * 6 + 2, col);
                    }
                    return;
                }
            }

            updateParticles();
        }

        function hexToRgb(hex) {
            if (!hex || !hex.startsWith('#')) return '200,200,200';
            const n = parseInt(hex.slice(1), 16);
            return `${(n >> 16) & 255},${(n >> 8) & 255},${n & 255}`;
        }

        function recordResult() {
            const r = game.runner;
            players[currentPlayer].best = {
                distance: Math.floor(r.distance),
                scene: currentScene().name,
                maxSpeed: Math.floor(r.maxSpeed * 5),
                scenesVisited: game.scenesVisited
            };
            if (currentPlayer === 0) {
                state = 'finished';
            } else {
                state = 'results';
                resultsTimer = 0;
                initConfetti();
            }
        }

        // --- ACCESORIOS ---
        function drawAccessory(skin, headCX, headCY, headR, w, isDucking) {
            const acc = skin.acc;
            if (!acc) return;

            if (acc === 'corona') {
                ctx.fillStyle = skin.accColor;
                const crownY = headCY - headR - 4;
                ctx.beginPath();
                ctx.moveTo(headCX - 8, crownY + 8);
                ctx.lineTo(headCX - 8, crownY);
                ctx.lineTo(headCX - 4, crownY + 4);
                ctx.lineTo(headCX, crownY - 2);
                ctx.lineTo(headCX + 4, crownY + 4);
                ctx.lineTo(headCX + 8, crownY);
                ctx.lineTo(headCX + 8, crownY + 8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#E53935';
                ctx.beginPath();
                ctx.arc(headCX, crownY + 3, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            if (acc === 'vincha') {
                ctx.strokeStyle = skin.accColor;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(headCX, headCY - 2, headR + 1, Math.PI * 1.1, Math.PI * 1.9);
                ctx.stroke();
            }

            if (acc === 'lentes') {
                ctx.fillStyle = skin.accColor;
                ctx.fillRect(headCX - headR * 0.8, headCY - 4, headR * 1.6, 3);
                ctx.fillRect(headCX - headR * 0.75, headCY - 4, headR * 0.65, 8);
                ctx.fillRect(headCX + headR * 0.1, headCY - 4, headR * 0.65, 8);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(headCX - headR * 0.65, headCY - 2, 3, 3);
                ctx.fillRect(headCX + headR * 0.2, headCY - 2, 3, 3);
            }

            if (acc === 'casco') {
                ctx.strokeStyle = skin.accColor;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(headCX, headCY, headR + 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(100,181,246,0.4)';
                ctx.beginPath();
                ctx.arc(headCX, headCY, headR + 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(headCX - 3, headCY - 3, headR * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            if (acc === 'mascara') {
                ctx.fillStyle = skin.accColor;
                ctx.fillRect(headCX - headR, headCY - 4, headR * 2, 8);
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(headCX - 4, headCY - 1, 3.5, 2, -0.2, 0, Math.PI * 2);
                ctx.ellipse(headCX + 4, headCY - 1, 3.5, 2, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(headCX - 4, headCY - 1, 1.5, 0, Math.PI * 2);
                ctx.arc(headCX + 4, headCY - 1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = skin.accColor;
                ctx.beginPath();
                ctx.arc(headCX, headCY - 2, headR, Math.PI, Math.PI * 2);
                ctx.fill();
            }

            if (acc === 'herida') {
                ctx.strokeStyle = skin.accColor;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(headCX + 3, headCY + 1);
                ctx.lineTo(headCX + 7, headCY + 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(headCX + 5, headCY);
                ctx.lineTo(headCX + 5, headCY + 6);
                ctx.stroke();
            }

            if (acc === 'capa') {
                // drawn separately in drawRunner
            }
        }

        // --- DIBUJO PERSONAJE (mejorado con bob y fluidez) ---
        function drawRunner(x, y, w, h, player, invincible, grounded, runFrame, ducking) {
            if (invincible > 0 && Math.floor(invincible / 4) % 2 === 0) return;

            const skin = player.skin || skins[0];
            const legAnim = grounded ? Math.sin(runFrame * 0.3) : 0.5;
            const armAnim = grounded ? Math.sin(runFrame * 0.3 + Math.PI) : -0.3;
            // Torso/head bob
            const bob = grounded ? Math.abs(Math.sin(runFrame * 0.3)) * 2 : 0;
            const headBob = grounded ? Math.sin(runFrame * 0.6) * 1.2 : 0;

            ctx.save();

            if (ducking) {
                const bodyTop = y + h * 0.1;
                const bodyH = h * 0.5;

                if (skin.acc === 'capa') {
                    ctx.fillStyle = skin.accColor;
                    ctx.beginPath();
                    ctx.moveTo(x + w * 0.1, bodyTop);
                    ctx.lineTo(x - 10, bodyTop + bodyH + 10);
                    ctx.lineTo(x + w * 0.3, bodyTop + bodyH);
                    ctx.closePath();
                    ctx.fill();
                }

                const skinC = skin.skinTint || player.skinColor;

                // Cuello ducking
                ctx.fillStyle = skinC;
                ctx.fillRect(x + w * 0.78, bodyTop + bodyH * 0.05, 6, 6);

                ctx.fillStyle = skin.shirtColor;
                ctx.fillRect(x + w * 0.05, bodyTop, w * 0.9, bodyH);
                if (skin.stripe) {
                    ctx.fillStyle = skin.stripe;
                    ctx.fillRect(x + w * 0.05, bodyTop + bodyH * 0.35, w * 0.9, bodyH * 0.3);
                }

                // Brazos ducking con manos
                ctx.strokeStyle = skinC;
                ctx.lineWidth = 3.5;
                const dArmY = bodyTop + bodyH * 0.3;
                const dLHandX = x + w * 0.05 - 5;
                const dLHandY = dArmY + 4;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.05, dArmY);
                ctx.lineTo(dLHandX, dLHandY);
                ctx.stroke();
                const dRHandX = x + w * 0.95 + 5;
                const dRHandY = dArmY + 4;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.95, dArmY);
                ctx.lineTo(dRHandX, dRHandY);
                ctx.stroke();
                // Manos
                ctx.fillStyle = skinC;
                ctx.beginPath();
                ctx.arc(dLHandX, dLHandY, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(dRHandX, dRHandY, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Cabeza
                ctx.fillStyle = skinC;
                const headR = w * 0.28;
                const dHeadCX = x + w * 0.85;
                const dHeadCY = bodyTop + bodyH * 0.3;
                ctx.beginPath();
                ctx.arc(dHeadCX, dHeadCY, headR, 0, Math.PI * 2);
                ctx.fill();

                // Orejas ducking
                const dEarR = headR * 0.18;
                ctx.beginPath();
                ctx.arc(dHeadCX - headR, dHeadCY, dEarR, Math.PI * 0.5, Math.PI * 1.5);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(dHeadCX + headR, dHeadCY, dEarR, -Math.PI * 0.5, Math.PI * 0.5);
                ctx.fill();

                // Pelo diferenciado ducking
                if (skin.acc !== 'casco' && skin.acc !== 'mascara') {
                    const hColor = player.hairColor || '#F9D853';
                    ctx.fillStyle = hColor;
                    if (player.hairStyle === 'rulos') {
                        const ruloR = headR * 0.25;
                        const ruloPos = [
                            [dHeadCX - headR * 0.4, dHeadCY - headR * 0.6],
                            [dHeadCX, dHeadCY - headR * 0.75],
                            [dHeadCX + headR * 0.35, dHeadCY - headR * 0.55],
                            [dHeadCX - headR * 0.15, dHeadCY - headR * 0.7],
                        ];
                        ctx.beginPath();
                        for (const [rx, ry] of ruloPos) {
                            ctx.moveTo(rx + ruloR, ry);
                            ctx.arc(rx, ry, ruloR, 0, Math.PI * 2);
                        }
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(dHeadCX, dHeadCY - 2, headR, Math.PI, Math.PI * 2);
                        ctx.fill();
                        // Mechón
                        ctx.beginPath();
                        ctx.moveTo(dHeadCX + headR * 0.3, dHeadCY - headR);
                        ctx.quadraticCurveTo(dHeadCX + headR * 0.7, dHeadCY - headR * 1.2, dHeadCX + headR * 0.5, dHeadCY - headR * 0.5);
                        ctx.fill();
                    }
                }

                // Cejas ducking (fruncidas)
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.moveTo(dHeadCX - 2, dHeadCY - 5);
                ctx.lineTo(dHeadCX + 2, dHeadCY - 4);
                ctx.stroke();

                // Ojos entrecerrados (líneas)
                ctx.strokeStyle = skin.acc === 'zombie' ? '#C62828' : '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(dHeadCX - 1, dHeadCY - 1);
                ctx.lineTo(dHeadCX + 5, dHeadCY - 1);
                ctx.stroke();

                // Boca de esfuerzo (línea tensa)
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(dHeadCX - 2, dHeadCY + 3);
                ctx.lineTo(dHeadCX + 4, dHeadCY + 3);
                ctx.stroke();

                drawAccessory(skin, dHeadCX, dHeadCY, headR, w, true);

                // Piernas ducking
                ctx.strokeStyle = skinC;
                ctx.lineWidth = 3.5;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.15, bodyTop + bodyH);
                ctx.lineTo(x + w * 0.1, bodyTop + bodyH + h * 0.35);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + w * 0.35, bodyTop + bodyH);
                ctx.lineTo(x + w * 0.3, bodyTop + bodyH + h * 0.35);
                ctx.stroke();

                ctx.fillStyle = skin.shoeColor;
                ctx.fillRect(x + w * 0.05, bodyTop + bodyH + h * 0.32, 9, 4);
                ctx.fillRect(x + w * 0.25, bodyTop + bodyH + h * 0.32, 9, 4);

                ctx.restore();
                return;
            }

            // --- Normal (running) with bob ---
            const skinC = skin.skinTint || player.skinColor;
            const yOff = -bob; // torso bounce

            // Inclinación al correr
            if (grounded) {
                ctx.translate(x + w / 2, y + h);
                ctx.rotate(-0.05);
                ctx.translate(-(x + w / 2), -(y + h));
            }

            if (skin.acc === 'capa') {
                ctx.fillStyle = skin.accColor;
                const capaWave = Math.sin(runFrame * 0.2) * 4;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.2, y + h * 0.32 + yOff);
                ctx.lineTo(x - 8 + capaWave, y + h * 0.85);
                ctx.lineTo(x + w * 0.5, y + h * 0.75);
                ctx.closePath();
                ctx.fill();
            }

            // Cuello
            const bodyTop = y + h * 0.3 + yOff;
            const bodyH = h * 0.35;
            ctx.fillStyle = skinC;
            ctx.fillRect(x + w / 2 - 4, bodyTop - 4, 8, 8);

            // Shirt
            ctx.fillStyle = skin.shirtColor;
            ctx.fillRect(x + w * 0.15, bodyTop, w * 0.7, bodyH);
            if (skin.stripe) {
                ctx.fillStyle = skin.stripe;
                ctx.fillRect(x + w * 0.15, bodyTop + bodyH * 0.35, w * 0.7, bodyH * 0.3);
            }

            // Head with bob
            ctx.fillStyle = skinC;
            const headR = w * 0.32;
            const headCX = x + w / 2;
            const headCY = y + headR + yOff + headBob;
            ctx.beginPath();
            ctx.arc(headCX, headCY, headR, 0, Math.PI * 2);
            ctx.fill();

            // Orejas
            const earR = headR * 0.2;
            ctx.fillStyle = skinC;
            ctx.beginPath();
            ctx.arc(headCX - headR, headCY, earR, Math.PI * 0.5, Math.PI * 1.5);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(headCX + headR, headCY, earR, -Math.PI * 0.5, Math.PI * 0.5);
            ctx.fill();

            // Pelo diferenciado
            if (skin.acc !== 'casco' && skin.acc !== 'mascara') {
                const hColor = player.hairColor || '#F9D853';
                ctx.fillStyle = hColor;
                if (player.hairStyle === 'rulos') {
                    // Rulos: circulitos superpuestos en la corona
                    const ruloR = headR * 0.28;
                    const ruloPositions = [
                        [headCX - headR * 0.55, headCY - headR * 0.65],
                        [headCX - headR * 0.15, headCY - headR * 0.85],
                        [headCX + headR * 0.25, headCY - headR * 0.8],
                        [headCX + headR * 0.6, headCY - headR * 0.55],
                        [headCX - headR * 0.35, headCY - headR * 0.8],
                    ];
                    ctx.beginPath();
                    for (const [rx, ry] of ruloPositions) {
                        ctx.moveTo(rx + ruloR, ry);
                        ctx.arc(rx, ry, ruloR, 0, Math.PI * 2);
                    }
                    ctx.fill();
                } else {
                    // Corto: semicírculo + mechón al frente
                    ctx.beginPath();
                    ctx.arc(headCX, headCY - 3, headR, Math.PI, Math.PI * 2);
                    ctx.fill();
                    // Mechón
                    ctx.beginPath();
                    ctx.moveTo(headCX + headR * 0.3, headCY - headR);
                    ctx.quadraticCurveTo(headCX + headR * 0.7, headCY - headR * 1.3, headCX + headR * 0.5, headCY - headR * 0.5);
                    ctx.fill();
                }

                // Pelo con viento (líneas curvas desde atrás)
                if (grounded) {
                    ctx.strokeStyle = hColor;
                    ctx.lineWidth = 1.5;
                    for (let i = 0; i < 3; i++) {
                        const windWave = Math.sin(runFrame * 0.3 + i) * 3;
                        const startY = headCY - headR * 0.5 + i * headR * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(headCX - headR * 0.8, startY);
                        ctx.quadraticCurveTo(headCX - headR * 1.2, startY + windWave, headCX - headR * 1.4 - i * 2, startY + windWave * 1.5);
                        ctx.stroke();
                    }
                }
            }

            // Cejas
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.moveTo(headCX - 6, headCY - 5);
            ctx.lineTo(headCX - 2, headCY - 6);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(headCX + 2, headCY - 6);
            ctx.lineTo(headCX + 6, headCY - 5);
            ctx.stroke();

            // Ojos - expresiones según estado
            ctx.fillStyle = skin.id === 'zombie' ? '#C62828' : '#333';
            if (!grounded) {
                // Saltando: ojos grandes de sorpresa
                ctx.beginPath();
                ctx.arc(headCX - 4, headCY - 1, 3.2, 0, Math.PI * 2);
                ctx.arc(headCX + 4, headCY - 1, 3.2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Normal
                ctx.beginPath();
                ctx.arc(headCX - 4, headCY - 1, 2.5, 0, Math.PI * 2);
                ctx.arc(headCX + 4, headCY - 1, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Boca - expresiones según estado
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            if (skin.id === 'zombie') {
                ctx.arc(headCX, headCY + 3, 4, 0, Math.PI);
            } else if (!grounded) {
                // Saltando: boca "O" abierta
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(headCX, headCY + 4, 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.arc(headCX, headCY + 3, 5, 0.1 * Math.PI, 0.9 * Math.PI);
            }
            ctx.stroke();

            drawAccessory(skin, headCX, headCY, headR, w, false);

            // Shorts
            ctx.fillStyle = skin.shortsColor;
            const shortsTop = bodyTop + bodyH;
            ctx.fillRect(x + w * 0.2, shortsTop, w * 0.6, h * 0.12);

            // Legs - improved fluidity with knee bend
            ctx.strokeStyle = skinC;
            ctx.lineWidth = 4;
            const legStart = shortsTop + h * 0.12;
            const legLen = h * 0.22;
            // Left leg with slight knee bend
            const lKneeX = x + w * 0.35 + legAnim * 4;
            const lKneeY = legStart + legLen * 0.5;
            const lFootX = x + w * 0.35 + legAnim * 10;
            const lFootY = legStart + legLen;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.35, legStart);
            ctx.quadraticCurveTo(lKneeX, lKneeY, lFootX, lFootY);
            ctx.stroke();
            // Right leg
            const rKneeX = x + w * 0.65 - legAnim * 4;
            const rKneeY = legStart + legLen * 0.5;
            const rFootX = x + w * 0.65 - legAnim * 10;
            const rFootY = legStart + legLen;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.65, legStart);
            ctx.quadraticCurveTo(rKneeX, rKneeY, rFootX, rFootY);
            ctx.stroke();

            // Shoes
            ctx.fillStyle = skin.shoeColor;
            ctx.fillRect(lFootX - 4, lFootY - 2, 10, 5);
            ctx.fillRect(rFootX - 4, rFootY - 2, 10, 5);

            // Arms
            ctx.strokeStyle = skinC;
            ctx.lineWidth = 3.5;
            const armY = bodyTop + 5;
            const lHandX = x + w * 0.15 + armAnim * 10 - 5;
            const lHandY = armY + h * 0.2;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.15, armY);
            ctx.lineTo(lHandX, lHandY);
            ctx.stroke();
            const rHandX = x + w * 0.85 - armAnim * 10 + 5;
            const rHandY = armY + h * 0.2;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.85, armY);
            ctx.lineTo(rHandX, rHandY);
            ctx.stroke();

            // Manos
            ctx.fillStyle = skinC;
            ctx.beginPath();
            ctx.arc(lHandX, lHandY, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(rHandX, rHandY, 3, 0, Math.PI * 2);
            ctx.fill();

            // Number
            ctx.fillStyle = skin.stripe ? skin.shirtColor : '#fff';
            ctx.font = `bold ${Math.floor(h * 0.16)}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(player.name === 'GINO' ? '10' : '7', x + w / 2, bodyTop + bodyH * 0.7);

            ctx.restore();
        }

        function drawFlyingWarning(o) {
            ctx.strokeStyle = 'rgba(255,50,50,0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(o.x, o.y + o.h);
            ctx.lineTo(o.x + o.w, o.y + o.h);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawBirdShape(o, bodyColor, wingColor) {
            const wingY = Math.sin(o.wingFrame * 0.3) * 6;
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(o.x + o.w / 2, o.y + o.h / 2, o.w * 0.3, o.h * 0.35, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = wingColor;
            ctx.beginPath();
            ctx.moveTo(o.x + o.w * 0.3, o.y + o.h * 0.4);
            ctx.lineTo(o.x - 5, o.y + wingY);
            ctx.lineTo(o.x + o.w * 0.2, o.y + o.h * 0.6);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(o.x + o.w * 0.7, o.y + o.h * 0.4);
            ctx.lineTo(o.x + o.w + 5, o.y + wingY);
            ctx.lineTo(o.x + o.w * 0.8, o.y + o.h * 0.6);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(o.x + o.w * 0.55, o.y + o.h * 0.4, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(o.x + o.w * 0.57, o.y + o.h * 0.4, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawObstacle(o) {
            const t = o.type;

            if (t === 'rock') {
                ctx.fillStyle = '#78909C';
                ctx.beginPath();
                ctx.moveTo(o.x, o.y + o.h); ctx.lineTo(o.x + o.w * 0.2, o.y);
                ctx.lineTo(o.x + o.w * 0.8, o.y + o.h * 0.1); ctx.lineTo(o.x + o.w, o.y + o.h);
                ctx.closePath(); ctx.fill();
            } else if (t === 'cactus') {
                ctx.fillStyle = '#66BB6A';
                ctx.fillRect(o.x + o.w * 0.3, o.y, o.w * 0.4, o.h);
                ctx.fillRect(o.x, o.y + o.h * 0.25, o.w * 0.3, o.w * 0.35);
                ctx.fillRect(o.x + o.w * 0.7, o.y + o.h * 0.4, o.w * 0.3, o.w * 0.35);
                ctx.fillStyle = '#43A047';
                ctx.fillRect(o.x + o.w * 0.4, o.y, o.w * 0.1, o.h);
            } else if (t === 'tronco') {
                ctx.fillStyle = '#6D4C41';
                ctx.fillRect(o.x, o.y + o.h * 0.3, o.w, o.h * 0.5);
                ctx.fillStyle = '#5D4037';
                ctx.beginPath();
                ctx.ellipse(o.x + o.w, o.y + o.h * 0.55, o.h * 0.35, o.h * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8D6E63';
                ctx.beginPath();
                ctx.ellipse(o.x + o.w, o.y + o.h * 0.55, o.h * 0.2, o.h * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
            } else if (t === 'hongo') {
                ctx.fillStyle = '#BCAAA4';
                ctx.fillRect(o.x + o.w * 0.35, o.y + o.h * 0.4, o.w * 0.3, o.h * 0.6);
                ctx.fillStyle = '#E53935';
                ctx.beginPath();
                ctx.arc(o.x + o.w / 2, o.y + o.h * 0.4, o.w * 0.5, Math.PI, 0);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(o.x + o.w * 0.35, o.y + o.h * 0.25, 3, 0, Math.PI * 2);
                ctx.arc(o.x + o.w * 0.65, o.y + o.h * 0.3, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (t === 'serpiente') {
                ctx.strokeStyle = '#F9A825';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(o.x, o.y + o.h);
                for (let sx = 0; sx < o.w; sx += 8) {
                    ctx.lineTo(o.x + sx, o.y + o.h - Math.sin(sx * 0.4) * 8);
                }
                ctx.stroke();
                ctx.fillStyle = '#F57F17';
                ctx.beginPath();
                ctx.arc(o.x + o.w, o.y + o.h * 0.3, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(o.x + o.w + 2, o.y + o.h * 0.25, 1.5, 0, Math.PI * 2);
                ctx.fill();
            } else if (t === 'hielo') {
                ctx.fillStyle = '#B3E5FC';
                ctx.beginPath();
                ctx.moveTo(o.x, o.y + o.h); ctx.lineTo(o.x + o.w * 0.3, o.y);
                ctx.lineTo(o.x + o.w * 0.7, o.y + o.h * 0.15);
                ctx.lineTo(o.x + o.w, o.y + o.h);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.moveTo(o.x + o.w * 0.3, o.y);
                ctx.lineTo(o.x + o.w * 0.4, o.y + o.h * 0.5);
                ctx.lineTo(o.x + o.w * 0.2, o.y + o.h * 0.4);
                ctx.closePath(); ctx.fill();
            } else if (t === 'snowman') {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(o.x + o.w / 2, o.y + o.h * 0.75, o.w * 0.45, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath();
                ctx.arc(o.x + o.w / 2, o.y + o.h * 0.4, o.w * 0.35, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath();
                ctx.arc(o.x + o.w / 2, o.y + o.h * 0.15, o.w * 0.25, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(o.x + o.w * 0.4, o.y + o.h * 0.12, 1.5, 0, Math.PI * 2);
                ctx.arc(o.x + o.w * 0.6, o.y + o.h * 0.12, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FF9800';
                ctx.beginPath();
                ctx.moveTo(o.x + o.w * 0.5, o.y + o.h * 0.15);
                ctx.lineTo(o.x + o.w * 0.7, o.y + o.h * 0.17);
                ctx.lineTo(o.x + o.w * 0.5, o.y + o.h * 0.19);
                ctx.closePath(); ctx.fill();
            } else if (t === 'auto') {
                ctx.fillStyle = '#E53935';
                ctx.fillRect(o.x + 5, o.y + o.h * 0.3, o.w - 10, o.h * 0.5);
                ctx.fillStyle = '#C62828';
                ctx.fillRect(o.x + 12, o.y, o.w * 0.5, o.h * 0.4);
                ctx.fillStyle = '#90CAF9';
                ctx.fillRect(o.x + 14, o.y + 3, o.w * 0.2, o.h * 0.25);
                ctx.fillRect(o.x + 14 + o.w * 0.22, o.y + 3, o.w * 0.2, o.h * 0.25);
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(o.x + 12, o.y + o.h, 5, 0, Math.PI * 2);
                ctx.arc(o.x + o.w - 12, o.y + o.h, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFD54F';
                ctx.fillRect(o.x + o.w - 6, o.y + o.h * 0.4, 4, 5);
            } else if (t === 'cono') {
                ctx.fillStyle = '#FF6D00';
                ctx.beginPath();
                ctx.moveTo(o.x + o.w / 2, o.y);
                ctx.lineTo(o.x, o.y + o.h);
                ctx.lineTo(o.x + o.w, o.y + o.h);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillRect(o.x + 2, o.y + o.h * 0.4, o.w - 4, 4);
                ctx.fillRect(o.x + 4, o.y + o.h * 0.65, o.w - 8, 3);
            } else if (t === 'box') {
                ctx.fillStyle = '#8D6E63';
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.fillStyle = '#6D4C41';
                ctx.fillRect(o.x + 2, o.y + 2, o.w - 4, 3);
                ctx.fillRect(o.x + 2, o.y + o.h - 5, o.w - 4, 3);
            } else if (t === 'meteorito') {
                ctx.fillStyle = '#795548';
                ctx.beginPath();
                ctx.arc(o.x + o.w / 2, o.y + o.h / 2, o.w * 0.45, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FF6D00';
                ctx.beginPath();
                ctx.arc(o.x + o.w * 0.3, o.y + o.h * 0.3, 4, 0, Math.PI * 2);
                ctx.arc(o.x + o.w * 0.65, o.y + o.h * 0.6, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (t === 'alien') {
                ctx.fillStyle = '#76FF03';
                ctx.beginPath();
                ctx.ellipse(o.x + o.w / 2, o.y + o.h * 0.6, o.w * 0.35, o.h * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#69F0AE';
                ctx.beginPath();
                ctx.ellipse(o.x + o.w / 2, o.y + o.h * 0.2, o.w * 0.4, o.h * 0.25, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(o.x + o.w * 0.35, o.y + o.h * 0.18, 4, 5, -0.2, 0, Math.PI * 2);
                ctx.ellipse(o.x + o.w * 0.65, o.y + o.h * 0.18, 4, 5, 0.2, 0, Math.PI * 2);
                ctx.fill();
            } else if (t === 'cristal') {
                ctx.fillStyle = '#E040FB';
                ctx.beginPath();
                ctx.moveTo(o.x + o.w * 0.5, o.y);
                ctx.lineTo(o.x + o.w, o.y + o.h * 0.6);
                ctx.lineTo(o.x + o.w * 0.7, o.y + o.h);
                ctx.lineTo(o.x + o.w * 0.3, o.y + o.h);
                ctx.lineTo(o.x, o.y + o.h * 0.6);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.moveTo(o.x + o.w * 0.5, o.y);
                ctx.lineTo(o.x + o.w * 0.6, o.y + o.h * 0.5);
                ctx.lineTo(o.x + o.w * 0.4, o.y + o.h * 0.4);
                ctx.closePath(); ctx.fill();
            }

            // Flying obstacles
            else if (t === 'bird' || t === 'buitre' || t === 'cartel' || t === 'satelite') {
                const gy = game ? game.groundY : 470;
                const visH = 25;
                const visY = gy - 55;
                const vis = { x: o.x, y: visY, w: o.w, h: visH, wingFrame: o.wingFrame };

                ctx.fillStyle = 'rgba(255,0,0,0.08)';
                ctx.fillRect(o.x - 2, 0, o.w + 4, gy - 20);

                if (t === 'bird') drawBirdShape(vis, '#F44336', '#D32F2F');
                else if (t === 'buitre') drawBirdShape(vis, '#5D4037', '#3E2723');
                else if (t === 'cartel') {
                    ctx.fillStyle = '#FFD54F';
                    ctx.fillRect(vis.x, vis.y, vis.w, vis.h);
                    ctx.strokeStyle = '#F57F17';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(vis.x, vis.y, vis.w, vis.h);
                    ctx.fillStyle = '#333';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('PELIGRO', vis.x + vis.w / 2, vis.y + vis.h * 0.7);
                } else if (t === 'satelite') {
                    ctx.fillStyle = '#B0BEC5';
                    ctx.fillRect(vis.x + vis.w * 0.3, vis.y + 3, vis.w * 0.4, vis.h - 6);
                    ctx.fillStyle = '#1565C0';
                    ctx.fillRect(vis.x, vis.y + 2, vis.w * 0.28, vis.h - 4);
                    ctx.fillRect(vis.x + vis.w * 0.72, vis.y + 2, vis.w * 0.28, vis.h - 4);
                    ctx.fillStyle = '#EF5350';
                    ctx.beginPath();
                    ctx.arc(vis.x + vis.w * 0.5, vis.y + 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                drawFlyingWarning(vis);
            }
        }

        // --- DRAW BACKGROUND (with parallax + transition) ---
        function drawBackground() {
            const lvl = sceneTransition.active ? getTransitionedScene() : currentScene();
            const grad = ctx.createLinearGradient(0, 0, 0, game.groundY);
            grad.addColorStop(0, lvl.sky1);
            grad.addColorStop(1, lvl.sky2);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_W, game.groundY);

            // Stars in space
            if (currentScene().isSpace) {
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 60; i++) {
                    const sx = (i * 97 + Math.sin(i) * 50) % 800;
                    const sy = (i * 53 + Math.cos(i) * 30) % (game.groundY - 20);
                    const size = 1 + Math.sin(Date.now() / 500 + i) * 0.5;
                    ctx.beginPath();
                    ctx.arc(sx, sy, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Clouds (not in space)
            if (game.currentScene !== 4) {
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                game.clouds.forEach(c => {
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, c.w * 0.25, 0, Math.PI * 2);
                    ctx.arc(c.x + c.w * 0.25, c.y - 8, c.w * 0.3, 0, Math.PI * 2);
                    ctx.arc(c.x + c.w * 0.55, c.y, c.w * 0.22, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            // Mountains (far layer - speed * 0.1)
            ctx.fillStyle = lvl.mountain;
            for (let i = 0; i < 4; i++) {
                const mx = i * 250 - (game.bgOffset * 0.1) % 250;
                ctx.beginPath();
                ctx.moveTo(mx, game.groundY);
                ctx.lineTo(mx + 125, game.groundY - 100);
                ctx.lineTo(mx + 250, game.groundY);
                ctx.fill();
            }

            // Hills (middle layer - speed * 0.2) - NEW PARALLAX LAYER
            ctx.fillStyle = lvl.hills || lvl.mountain;
            game.hills.forEach(h => {
                ctx.beginPath();
                ctx.moveTo(h.x, game.groundY);
                ctx.quadraticCurveTo(h.x + h.w / 2, game.groundY - h.h, h.x + h.w, game.groundY);
                ctx.fill();
            });

            // Trees/buildings (speed * 0.3)
            if (currentScene().isCity) {
                game.trees.forEach(t => {
                    ctx.fillStyle = '#546E7A';
                    ctx.fillRect(t.x, game.groundY - t.h - 20, 28, t.h + 20);
                    ctx.fillStyle = '#FFD54F';
                    for (let wy = 0; wy < t.h; wy += 15) {
                        for (let wx = 4; wx < 24; wx += 10) {
                            if (Math.sin(t.x + wy + wx) > 0) {
                                ctx.fillRect(t.x + wx, game.groundY - t.h - 15 + wy, 5, 7);
                            }
                        }
                    }
                });
            } else {
                game.trees.forEach(t => {
                    ctx.fillStyle = lvl.treeTrunk;
                    ctx.fillRect(t.x + 8, game.groundY - t.h, 6, t.h);
                    ctx.fillStyle = lvl.treeLeaf1;
                    ctx.beginPath();
                    ctx.arc(t.x + 11, game.groundY - t.h - 5, 18, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = lvl.treeLeaf2;
                    ctx.beginPath();
                    ctx.arc(t.x + 11, game.groundY - t.h - 12, 13, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            // Ground
            ctx.fillStyle = lvl.ground;
            ctx.fillRect(0, game.groundY, GAME_W, GAME_H - game.groundY);
            ctx.fillStyle = lvl.groundLine;
            ctx.fillRect(0, game.groundY, GAME_W, 4);

            // Grass (close layer - speed * 0.8)
            ctx.fillStyle = lvl.grass;
            for (let i = 0; i < 40; i++) {
                const gx = (i * 22 - game.bgOffset * 0.8) % 820;
                ctx.fillRect(gx, game.groundY - 3, 2, 6);
            }
        }

        // --- HUD (improved meter counter) ---
        function drawHUD() {
            const r = game.runner;
            const p = players[currentPlayer];
            const scene = currentScene();

            // Player panel
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.beginPath();
            ctx.roundRect(10, 10, 220, 55, 10);
            ctx.fill();

            ctx.fillStyle = p.color;
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`${p.name}`, 22, 34);

            // Meter counter with pop effect
            const popScale = meterPop > 0 ? 1 + (meterPop / 30) * 0.3 : 1;
            const meterSize = Math.floor(18 * popScale);
            const meterColor = meterFlash > 0 ? `rgba(255,215,79,${0.5 + meterFlash / 80})` : '#FFD54F';
            ctx.fillStyle = meterColor;
            ctx.font = `bold ${meterSize}px Arial`;
            ctx.fillText(`${Math.floor(r.distance)}m`, 22, 54);

            ctx.fillStyle = '#90A4AE';
            ctx.font = '12px Arial';
            ctx.fillText(`${scene.name}`, 130, 54);

            // Speed
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.beginPath();
            ctx.roundRect(610, 10, 180, 32, 10);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'right';
            const speedKmh = Math.floor(r.speed * 5);
            ctx.fillText(`${speedKmh} km/h`, 780, 32);

            // Power-up HUD
            if (game.heldPowerup) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath();
                ctx.roundRect(610, 48, 180, 38, 10);
                ctx.fill();
                const puLabels = { shield: 'ESCUDO', magnet: 'IMAN +200m', slowmo: 'SLOW-MO' };
                const puColors = { shield: '#FFD54F', magnet: '#66BB6A', slowmo: '#42A5F5' };
                ctx.fillStyle = puColors[game.heldPowerup];
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(puLabels[game.heldPowerup], 740, 64);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '11px Arial';
                ctx.fillText('2x TAP', 780, 78);
            } else if (game.shieldActive) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath();
                ctx.roundRect(610, 48, 180, 28, 10);
                ctx.fill();
                ctx.fillStyle = '#FFD54F';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'right';
                ctx.fillText('ESCUDO ACTIVO', 780, 66);
            }

            // Slowmo timer
            if (game.slowmoTimer > 0) {
                ctx.fillStyle = 'rgba(33,150,243,0.7)';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                const secs = Math.ceil(game.slowmoTimer / 60);
                ctx.fillText(`SLOW-MO ${secs}s`, GAME_W / 2, 30);
            }

            // Controls hint
            if (!isMobile) {
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.font = '11px Arial';
                ctx.textAlign = 'right';
                ctx.fillText('ESPACIO = Saltar  |  S = Agacharse  |  2x = Power-up', 790, 96);
            }

            // Scene name fade-in
            if (sceneNameFade > 0) {
                const alpha = Math.min(sceneNameFade / 40, 1) * 0.9;
                const nameScale = sceneNameFade > 100 ? 1 + (sceneNameFade - 100) / 100 : 1;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#FFD54F';
                ctx.font = `bold ${Math.floor(32 * nameScale)}px Arial`;
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 10;
                ctx.fillText(sceneNameText, GAME_W / 2, 120);
                ctx.restore();
            }
        }

        // --- PANTALLAS ---
        function drawMenu() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            // Background stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const sx = (i * 97 + Math.sin(i) * 50) % 800;
                const sy = (i * 53 + Math.cos(i) * 30) % (GAME_H - 50);
                const size = 1 + Math.sin(Date.now() / 500 + i) * 0.5;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Falling particles
            updateMenuParticles();
            drawMenuParticles();

            const cy = GAME_H / 2;

            // Title with glow effect
            ctx.save();
            const glowIntensity = Math.sin(Date.now() / 600) * 0.4 + 0.6;
            ctx.shadowColor = `rgba(255,215,79,${glowIntensity})`;
            ctx.shadowBlur = 20 + Math.sin(Date.now() / 400) * 10;
            ctx.fillStyle = '#FFD54F';
            ctx.font = 'bold 52px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('CARRERA', 400, cy - 160);
            ctx.restore();

            // Subtitle shadow
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 6;
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = players[0].color;
            ctx.fillText('GINO', 260, cy - 90);
            ctx.fillStyle = '#FFD54F';
            ctx.fillText('vs', 400, cy - 90);
            ctx.fillStyle = players[1].color;
            ctx.fillText('BENI', 540, cy - 90);
            ctx.restore();

            // Animated ground under characters
            const groundMenuY = cy + 20;
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(150, groundMenuY, 500, 8);
            ctx.fillStyle = '#388E3C';
            ctx.fillRect(150, groundMenuY, 500, 3);
            // Animated grass
            ctx.fillStyle = '#66BB6A';
            for (let i = 0; i < 25; i++) {
                const gx = 150 + (i * 21 - (Date.now() / 50) % 21);
                if (gx >= 150 && gx <= 650) {
                    ctx.fillRect(gx, groundMenuY - 3, 2, 6);
                }
            }

            // Characters running on ground
            drawRunner(230, groundMenuY - 70, 45, 70, players[0], 0, true, Math.floor(Date.now() / 100));
            drawRunner(510, groundMenuY - 56, 38, 56, players[1], 0, true, Math.floor(Date.now() / 100));

            ctx.fillStyle = '#90A4AE';
            ctx.font = '15px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Escenarios: ${scenes.map(s => s.name).join(' > ')}`, 400, cy + 60);
            ctx.fillStyle = '#78909C';
            ctx.fillText('Un golpe y perdes. Gana el que recorre mas.', 400, cy + 85);

            // Start button
            const pulse = Math.sin(Date.now() / 300) * 0.15 + 0.85;
            ctx.save();
            ctx.shadowColor = 'rgba(76,175,80,0.5)';
            ctx.shadowBlur = 15 * pulse;
            ctx.fillStyle = `rgba(76, 175, 80, ${pulse})`;
            ctx.beginPath();
            ctx.roundRect(280, cy + 110, 240, 55, 14);
            ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('EMPEZAR', 400, cy + 144);
        }

        // --- SKIN SELECT (MUCHO MAS GRANDE) ---
        function drawSkinSelect() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            const p = players[skinSelectPlayer];

            // Title
            ctx.fillStyle = p.color;
            ctx.font = 'bold 34px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`${p.name} - Elegi tu skin`, 400, 50);

            // Skin grid - 2 columns on the left
            const cols = 2, boxW = 130, boxH = 120, gap = 14;
            const startX = 30;
            const startY = 75;

            for (let i = 0; i < skins.length; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const bx = startX + col * (boxW + gap);
                const by = startY + row * (boxH + gap);

                const isSelected = p.skin && p.skin.id === skins[i].id;
                const isHover = skinHover === i;

                // Box background
                ctx.fillStyle = isSelected ? 'rgba(255,215,0,0.2)' : isHover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
                ctx.strokeStyle = isSelected ? '#FFD54F' : isHover ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = isSelected ? 3 : 1.5;
                ctx.beginPath();
                ctx.roundRect(bx, by, boxW, boxH, 12);
                ctx.fill();
                ctx.stroke();

                // Character preview
                const previewPlayer = { ...p, skin: skins[i] };
                const pw = skinSelectPlayer === 0 ? 42 : 36;
                const ph = skinSelectPlayer === 0 ? 68 : 55;

                const animFrame = isSelected ? Math.floor(Date.now() / 80) : Math.floor(Date.now() / 120);
                drawRunner(bx + boxW / 2 - pw / 2, by + 10, pw, ph, previewPlayer, 0, true, animFrame);

                // Label
                ctx.fillStyle = isSelected ? '#FFD54F' : '#CFD8DC';
                ctx.font = `${isSelected ? 'bold ' : ''}14px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(skins[i].label, bx + boxW / 2, by + boxH - 10);

                if (isSelected) {
                    ctx.fillStyle = '#FFD54F';
                    ctx.font = '20px Arial';
                    ctx.fillText('✓', bx + boxW - 16, by + 20);
                }
            }

            // Large preview on the right
            const prevBoxX = 340, prevBoxY = 75, prevBoxW = 430, prevBoxH = 420;
            const selectedSkin = p.skin || skins[0];

            // Preview box background
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            ctx.strokeStyle = 'rgba(255,215,79,0.25)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(prevBoxX, prevBoxY, prevBoxW, prevBoxH, 16);
            ctx.fill();
            ctx.stroke();

            // Animated ground/grass inside preview
            const groundY = prevBoxY + prevBoxH - 50;
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(prevBoxX + 20, groundY, prevBoxW - 40, 6);
            ctx.fillStyle = '#388E3C';
            ctx.fillRect(prevBoxX + 20, groundY, prevBoxW - 40, 2);
            // Animated grass blades
            ctx.fillStyle = '#66BB6A';
            for (let i = 0; i < 20; i++) {
                const gx = prevBoxX + 20 + (i * 20 - (Date.now() / 50) % 20);
                if (gx >= prevBoxX + 20 && gx <= prevBoxX + prevBoxW - 40) {
                    ctx.fillRect(gx, groundY - 4, 2, 7);
                }
            }

            // Big character - scaled ~2.5x
            const previewBigW = skinSelectPlayer === 0 ? 110 : 95;
            const previewBigH = skinSelectPlayer === 0 ? 175 : 140;
            const charCenterX = prevBoxX + prevBoxW / 2;
            const cycleFrame = Math.floor(Date.now() / 100);
            const cycleSec = Math.floor(Date.now() / 1500) % 3;
            const previewP = { ...p, skin: selectedSkin };

            if (cycleSec === 2) {
                // Duck
                const duckH = Math.floor(previewBigH * DUCK_HEIGHT_RATIO);
