                drawRunner(charCenterX - previewBigW / 2, groundY - duckH - 4, previewBigW, duckH, previewP, 0, true, cycleFrame, true);
            } else {
                drawRunner(charCenterX - previewBigW / 2, groundY - previewBigH - 4, previewBigW, previewBigH, previewP, 0, cycleSec === 0, cycleFrame);
            }

            // Skin name below character
            ctx.fillStyle = '#FFD54F';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(selectedSkin.label, charCenterX, groundY + 30);

            // Confirm button - centered, below everything
            const btnW = 220, btnH = 50;
            const btnX = (GAME_W - btnW) / 2;
            const btnY = 610;
            ctx.save();
            ctx.shadowColor = 'rgba(76,175,80,0.4)';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnW, btnH, 12);
            ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('LISTO', GAME_W / 2, btnY + 33);
        }

        function drawDeadScreen() {
            drawBackground();
            game.obstacles.forEach(drawObstacle);
            const r = game.runner;
            const p = players[currentPlayer];
            ctx.save();
            ctx.globalAlpha = 0.6;
            drawRunner(r.x, r.y, r.w, r.h, p, 0, true, 0);
            ctx.restore();
            drawParticles();
            drawHUD();

            const alpha = Math.min(deadTimer / 40, 0.7);
            ctx.fillStyle = `rgba(0,0,0,${alpha})`;
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            if (deadTimer > 30) {
                ctx.fillStyle = '#FF5252';
                ctx.font = 'bold 44px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('CHOCASTE!', 400, GAME_H / 2 - 40);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 26px Arial';
                ctx.fillText(`${p.name} recorrio ${Math.floor(r.distance)}m`, 400, GAME_H / 2 + 15);
                ctx.fillStyle = '#B0BEC5';
                ctx.font = '18px Arial';
                ctx.fillText(`Ultimo escenario: ${currentScene().name}`, 400, GAME_H / 2 + 48);
            }
        }

        function drawFinishedScreen() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            const p = players[0];
            const b = p.best;

            ctx.fillStyle = p.color;
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            const cy = GAME_H / 2;
            ctx.fillText(`${p.name} termino`, 400, cy - 110);

            ctx.fillStyle = '#FFD54F';
            ctx.font = 'bold 48px Arial';
            ctx.fillText(`${b.distance}m`, 400, cy - 45);

            ctx.fillStyle = '#B0BEC5';
            ctx.font = '18px Arial';
            ctx.fillText(`Vel. max: ${b.maxSpeed} km/h | Escenarios: ${b.scenesVisited}`, 400, cy - 10);

            drawRunner(375, cy + 10, p.width, p.height, p, 0, true, Math.floor(Date.now() / 100));

            ctx.save();
            ctx.shadowColor = 'rgba(76,175,80,0.4)';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.roundRect(260, cy + 100, 280, 55, 14);
            ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 22px Arial';
            ctx.fillText(`Turno de ${players[1].name}`, 400, cy + 134);
        }

        // --- RESULTS (with podium, stats, confetti, fade-in) ---
        function drawResults() {
            resultsTimer++;
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            // Confetti particles
            updateConfetti();
            drawConfetti();

            const b0 = players[0].best;
            const b1 = players[1].best;
            let winner;
            if (b0.distance > b1.distance) winner = 0;
            else if (b1.distance > b0.distance) winner = 1;
            else winner = -1;

            const oy = 50;

            // Fade-in title
            const titleAlpha = Math.min(resultsTimer / 30, 1);
            ctx.save();
            ctx.globalAlpha = titleAlpha;
            ctx.shadowColor = 'rgba(255,215,79,0.5)';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#FFD54F';
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'center';

            if (winner >= 0) {
                ctx.fillText(`GANO ${players[winner].name}!`, 400, oy + 40);
            } else {
                ctx.fillText('EMPATE!', 400, oy + 40);
            }
            ctx.restore();

            // Player cards with fade-in
            for (let i = 0; i < 2; i++) {
                const cardAlpha = Math.min((resultsTimer - 15 - i * 15) / 25, 1);
                if (cardAlpha <= 0) continue;

                ctx.save();
                ctx.globalAlpha = Math.max(0, cardAlpha);

                const p = players[i];
                const b = p.best;
                const cx = i === 0 ? 210 : 590;
                const isWinner = winner === i;

                // Podium platform
                const podiumH = isWinner ? 100 : 60;
                const podiumY = oy + 380 - podiumH;
                const podiumW = 200;

                // Card background
                ctx.fillStyle = isWinner ? 'rgba(255,215,0,0.12)' : 'rgba(255,255,255,0.05)';
                ctx.strokeStyle = isWinner ? 'rgba(255,215,0,0.4)' : 'rgba(255,255,255,0.1)';
                ctx.lineWidth = isWinner ? 2 : 1;
                ctx.beginPath();
                ctx.roundRect(cx - 130, oy + 60, 260, 320, 14);
                ctx.fill();
                ctx.stroke();

                // Name
                ctx.fillStyle = p.color;
                ctx.font = `bold ${isWinner ? 32 : 26}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(p.name, cx, oy + 100);

                if (isWinner) {
                    ctx.fillStyle = '#FFD54F';
                    ctx.font = 'bold 18px Arial';
                    ctx.fillText('GANADOR', cx, oy + 125);
                }

                // Podium
                const podiumGrad = ctx.createLinearGradient(cx - podiumW / 2, podiumY, cx - podiumW / 2, podiumY + podiumH);
                podiumGrad.addColorStop(0, isWinner ? '#FFD54F' : '#546E7A');
                podiumGrad.addColorStop(1, isWinner ? '#F9A825' : '#37474F');
                ctx.fillStyle = podiumGrad;
                ctx.beginPath();
                ctx.roundRect(cx - podiumW / 2, podiumY, podiumW, podiumH, [8, 8, 0, 0]);
                ctx.fill();

                // Position number on podium
                ctx.fillStyle = isWinner ? '#795548' : '#90A4AE';
                ctx.font = `bold ${isWinner ? 36 : 28}px Arial`;
                ctx.fillText(isWinner ? '1' : '2', cx, podiumY + podiumH - 15);

                // Character on podium
                const charScale = isWinner ? 1.2 : 1;
                const cw = Math.floor(p.width * charScale);
                const ch = Math.floor(p.height * charScale);
                drawRunner(cx - cw / 2, podiumY - ch - 5, cw, ch, p, 0, true, Math.floor(Date.now() / 100));

                // Distance
                ctx.fillStyle = '#FFD54F';
                ctx.font = `bold ${isWinner ? 30 : 24}px Arial`;
                ctx.fillText(`${b.distance}m`, cx, oy + 405);

                // Stats
                ctx.fillStyle = '#90A4AE';
                ctx.font = '14px Arial';
                ctx.fillText(`Vel. max: ${b.maxSpeed} km/h`, cx, oy + 430);
                ctx.fillText(`Escenarios: ${b.scenesVisited}`, cx, oy + 450);
                ctx.fillText(`Ultimo: ${b.scene}`, cx, oy + 470);

                if (winner === i) {
                    const diff = Math.abs(b0.distance - b1.distance);
                    ctx.fillStyle = '#69F0AE';
                    ctx.font = 'bold 15px Arial';
                    ctx.fillText(`+${diff}m de ventaja`, cx, oy + 495);
                }

                ctx.restore();
            }

            // Play again button (fade in)
            const btnAlpha = Math.min((resultsTimer - 60) / 30, 1);
            if (btnAlpha > 0) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, btnAlpha);
                ctx.shadowColor = 'rgba(76,175,80,0.4)';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.roundRect(290, oy + 530, 220, 50, 12);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('JUGAR DE NUEVO', 400, oy + 561);
                ctx.restore();
            }
        }

        // --- DRAW LOOP ---
        function draw() {
            ctx.clearRect(0, 0, GAME_W, GAME_H);

            if (state === 'menu') drawMenu();
            else if (state === 'skinSelect') drawSkinSelect();
            else if (state === 'playing') {
                drawBackground();
                // Slowmo tint
                if (game.slowmoTimer > 0) {
                    ctx.fillStyle = `rgba(33,150,243,${0.08 + Math.sin(frameCount * 0.1) * 0.03})`;
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                }
                drawSpeedLines();
                game.obstacles.forEach(drawObstacle);
                // Power-ups en pantalla
                game.powerups.forEach(drawPowerupItem);
                const r = game.runner;
                const p = players[currentPlayer];
                // Aura de escudo activo
                if (game.shieldActive) {
                    ctx.save();
                    ctx.strokeStyle = `rgba(255,215,0,${0.4 + Math.sin(frameCount * 0.15) * 0.2})`;
                    ctx.lineWidth = 3;
                    ctx.shadowColor = 'rgba(255,215,0,0.5)';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.ellipse(r.x + r.w/2, r.y + r.h/2, r.w/2 + 8, r.h/2 + 5, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                drawRunner(r.x, r.y, r.w, r.h, p, 0, r.grounded, r.runFrame, r.ducking);
                drawParticles();
                drawHUD();
            }
            else if (state === 'dead') drawDeadScreen();
            else if (state === 'finished') drawFinishedScreen();
            else if (state === 'results') drawResults();
        }

        // --- INPUT ---
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function getSkinClickIndex(mx, my) {
            const cols = 2, boxW = 130, boxH = 120, gap = 14;
            const startX = 30;
            const startY = 75;
            for (let i = 0; i < skins.length; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const bx = startX + col * (boxW + gap);
                const by = startY + row * (boxH + gap);
                if (mx >= bx && mx <= bx + boxW && my >= by && my <= by + boxH) return i;
            }
            return -1;
        }

        function isSkinConfirmClick(mx, my) {
            const btnW = 220, btnH = 50;
            const btnX = (GAME_W - btnW) / 2;
            const btnY = 610;
            return mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH;
        }

        document.addEventListener('keydown', e => {
            keysDown[e.code] = true;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                e.preventDefault();
                if (state === 'playing') {
                    const now = Date.now();
                    // Doble tap detection
                    if (now - game.lastTapTime < 300 && game.heldPowerup) {
                        activatePowerup();
                        game.lastTapTime = 0;
                    } else {
                        game.lastTapTime = now;
                        if (game.runner.grounded && !game.runner.ducking) {
                            game.runner.vy = JUMP_FORCE;
                            game.runner.grounded = false;
                        }
                    }
                } else if (state === 'menu') goToSkinSelect();
                else if (state === 'finished') startNextPlayer();
                else if (state === 'results') resetGame();
            }
            if (e.code === 'ArrowDown' || e.code === 'KeyS') e.preventDefault();
        });

        document.addEventListener('keyup', e => {
            keysDown[e.code] = false;
        });

        canvas.addEventListener('mousemove', e => {
            if (state === 'skinSelect') {
                const { x, y } = getCanvasCoords(e);
                skinHover = getSkinClickIndex(x, y);
            }
        });

        canvas.addEventListener('click', e => {
            const { x, y } = getCanvasCoords(e);
            if (state === 'menu') goToSkinSelect();
            else if (state === 'skinSelect') {
                const idx = getSkinClickIndex(x, y);
                if (idx >= 0) players[skinSelectPlayer].skin = skins[idx];
                if (isSkinConfirmClick(x, y)) confirmSkin();
            }
            else if (state === 'finished') startNextPlayer();
            else if (state === 'results') resetGame();
        });

        // --- MOBILE BUTTON CONTROLS ---
        const btnJump = document.getElementById('btn-jump');
        const btnDuck = document.getElementById('btn-duck');

        btnJump.addEventListener('touchstart', e => {
            e.preventDefault();
            if (state === 'playing') {
                const now = Date.now();
                if (now - game.lastTapTime < 300 && game.heldPowerup) {
                    activatePowerup();
                    game.lastTapTime = 0;
                } else {
                    game.lastTapTime = now;
                    if (game.runner.grounded && !game.runner.ducking) {
                        game.runner.vy = JUMP_FORCE;
                        game.runner.grounded = false;
                    }
                }
            } else if (state === 'menu') goToSkinSelect();
            else if (state === 'finished') startNextPlayer();
            else if (state === 'results') resetGame();
        }, { passive: false });

        btnDuck.addEventListener('touchstart', e => {
            e.preventDefault();
            touchDucking = true;
            if (state === 'playing' && game.runner.grounded && !game.runner.ducking) {
                game.runner.ducking = true;
                game.runner.h = Math.floor(game.runner.normalH * DUCK_HEIGHT_RATIO);
                game.runner.y = game.groundY - game.runner.h;
            }
        }, { passive: false });

        btnDuck.addEventListener('touchend', e => {
            e.preventDefault();
            touchDucking = false;
        }, { passive: false });

        btnDuck.addEventListener('touchcancel', e => {
            touchDucking = false;
        });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const { x, y } = getCanvasCoords(e);
            if (state === 'menu') goToSkinSelect();
            else if (state === 'skinSelect') {
                const idx = getSkinClickIndex(x, y);
                if (idx >= 0) players[skinSelectPlayer].skin = skins[idx];
                if (isSkinConfirmClick(x, y)) confirmSkin();
            }
            else if (state === 'finished') startNextPlayer();
            else if (state === 'results') resetGame();
        }, { passive: false });

        function goToSkinSelect() {
            skinSelectPlayer = 0;
            players[0].best = null;
            players[1].best = null;
            players[0].skin = skins[0];
            players[1].skin = skins[1];
            state = 'skinSelect';
        }

        function confirmSkin() {
            if (skinSelectPlayer === 0) {
                skinSelectPlayer = 1;
            } else {
                currentPlayer = 0;
                initRun();
                state = 'playing';
            }
        }

        function startNextPlayer() {
            currentPlayer = 1;
            initRun();
            state = 'playing';
        }

        function resetGame() {
            state = 'menu';
        }

        // --- LOOP ---
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
